<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Quiz Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container" id="quiz-container">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div id="quiz-card">
            <div id="start-screen" class="screen active">
                <h2>Welcome to the Tech Quiz</h2>
                <p>Test your development knowledge! 5 Questions. Real-time scoring.</p>
                <button id="start-btn" class="btn">Start Quiz</button>
            </div>

            <div id="question-screen" class="screen">
                <div class="quiz-header">
                    <span id="question-number">Question 1 of 5</span>
                </div>
                <h3 id="question-text">Question text goes here?</h3>
                <div id="options-container" class="options-grid">
                    </div>
                <button id="next-btn" class="btn" disabled>Next Question</button>
            </div>

            <div id="result-screen" class="screen">
                <h2>Quiz Completed!</h2>
                <div class="score-badge">
                    <span id="final-score">0</span> / <span id="total-questions">5</span>
                </div>
                <p id="feedback-text">Great effort!</p>
                <button id="restart-btn" class="btn">Try Again</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
